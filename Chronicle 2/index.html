<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Chronicles - Proto Stories</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/1.9.1/showdown.min.js"></script>
    <style>
        /* Base styles for both light and dark themes */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        h1 {
            text-align: center;
        }

        .story-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .story-button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .story-button:hover {
            background-color: #45a049;
        }

        /* Markdown content div */
        #markdown-content {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            display: none; /* Hidden initially */
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            font-size: 1.1em;
        }

        /* Fallback message styles */
        #fallback-message {
            text-align: center;
            font-size: 1.2em;
            color: #888;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            margin-top: 40px;
            padding: 20px;
            background-color: #f4f4f4;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        /* Light theme styles */
        .light-theme {
            background-color: #fff;
            color: #000;
        }

        .light-theme #markdown-content {
            background-color: #f9f9f9;
            border-color: #ddd;
        }

        .light-theme #fallback-message {
            background-color: #f4f4f4;
            color: #333;
            border-color: #ddd;
        }

        /* Dark theme styles */
        .dark-theme {
            background-color: #121212;
            color: #eaeaea;
        }

        .dark-theme #markdown-content {
            background-color: #2c2c2c;
            border-color: #444;
            color: #eaeaea;
        }

        .dark-theme #fallback-message {
            background-color: #333;
            color: #eaeaea;
            border-color: #444;
        }

        /* Blockquote Styling */
        blockquote {
            background-color: #f4f4f4;
            border-left: 5px solid #4CAF50;
            padding: 10px 20px;
            margin: 20px 0;
            font-style: italic;
            color: #333;
        }

        /* Dark Theme Blockquote */
        .dark-theme blockquote {
            background-color: #333;
            border-left: 5px solid #4CAF50;
            color: #eaeaea;
        }

        /* Toggle button styles */
        #theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #theme-toggle:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body class="dark-theme">

    <h1>Aurora Chronicles - Proto Stories</h1>

    <div class="story-buttons" id="story-buttons">
        <!-- Buttons will be dynamically added here -->
    </div>

    <div id="markdown-content"></div>
    <div id="fallback-message">
        These stories are not fully written because I haven’t had enough time to focus on writing. I’ve been dedicating most of my time to other activities and hobbies, but I might return to them at a later time and date.
    </div>

    <button id="theme-toggle">Toggle Theme</button>

    <script>
        const repoOwner = "TempestAethel";
        const repoName = "AuroraChronicles";
        const branch = "main";  // Change if you want a different branch
        const directoryPath = "Chronicle%202/Proto";  // Path to the directory in the repository

        // GitHub API URL for fetching the content of the Proto directory
        const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${directoryPath}?ref=${branch}`;

        // Fetch the list of files in the Proto directory
        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (Array.isArray(data) && data.length > 0) {
                    // Filter out non-Markdown files (optional)
                    const markdownFiles = data.filter(file => file.name.endsWith('.md'));

                    // Generate buttons dynamically for each Markdown file
                    const storyButtonsContainer = document.getElementById('story-buttons');
                    markdownFiles.forEach(file => {
                        const button = document.createElement('button');
                        button.classList.add('story-button');
                        button.textContent = file.name.replace('.md', '');
                        button.addEventListener('click', () => loadStory(file.download_url)); // Download URL to fetch content
                        storyButtonsContainer.appendChild(button);
                    });
                } else {
                    // Show fallback message if no stories are available
                    document.getElementById('fallback-message').style.display = 'block';
                }
            })
            .catch(error => {
                console.error("Error fetching file list:", error);
                alert("Error loading the list of stories.");
                // Show fallback message if there's an error fetching data
                document.getElementById('fallback-message').style.display = 'block';
            });

        // Function to fetch and render the selected story
        function loadStory(url) {
            fetch(url)
                .then(response => response.text())
                .then(markdown => {
                    const converter = new showdown.Converter();
                    const htmlContent = converter.makeHtml(markdown);
                    document.getElementById('markdown-content').innerHTML = htmlContent;
                    document.getElementById('markdown-content').style.display = 'block';
                })
                .catch(error => {
                    document.getElementById('markdown-content').innerHTML = `<p>Error loading the story. Please try again later.</p>`;
                    console.error('Error loading story:', error);
                });
        }

        // Function to toggle theme
        const toggleTheme = () => {
            const body = document.body;
            const currentTheme = body.classList.contains('dark-theme') ? 'dark' : 'light';
            if (currentTheme === 'dark') {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
            }
        };

        // Theme toggle button click event
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.body.classList.remove(savedTheme === 'dark' ? 'light-theme' : 'dark-theme');
            document.body.classList.add(savedTheme === 'dark' ? 'dark-theme' : 'light-theme');
        }
    </script>

</body>
</html>
