<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="https://raw.githubusercontent.com/TempestAethel/AuroraChronicles/main/Favicon.png" type="image/png">

    <title>Story Hub</title>
    <style>
        :root {
            --background-dark: #121212;
            --text-dark: #ffffff;
            --background-light: #ffffff;
            --text-light: #000000;
            --highlight-color: #4e73df;
            --button-hover-color: #375a7f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--background-dark);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        body.light-theme {
            background-color: var(--background-light);
            color: var(--text-light);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--highlight-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        h2 {
            margin: 20px 0 10px;
            color: var(--highlight-color);
            font-size: 1.8rem;
            text-align: center;
        }

        .story-button {
            display: inline-block;
            background: var(--highlight-color);
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            margin: 8px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .story-button:hover {
            background: var(--button-hover-color);
        }

        .story-section {
            margin-bottom: 40px;
        }

        .story-container {
            display: flex; /* Change to flex to align items in a row */
            flex-wrap: wrap; /* Allow items to wrap to the next line if needed */
            justify-content: center; /* Center align items */
            gap: 10px; /* Space between buttons */
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #aaa;
        }

        .toggle-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            background-color: var(--highlight-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .toggle-btn:hover {
            background-color: var(--button-hover-color);
        }
    </style>
    
<script>
    function saveThemePreference(isLightTheme) {
        localStorage.setItem('theme', isLightTheme ? 'light' : 'dark');
    }

    function loadTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
        } else {
            document.body.classList.remove('light-theme');
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        const isLightTheme = document.body.classList.contains('light-theme');
        saveThemePreference(isLightTheme);
    }

    // Static data for stories categorized
    const stories = {
        "Flash Fiction": [
            { name: "A Tale of Two Perspectives", url: "https://tempestaethel.github.io/AuroraChronicles/Flash%20Fiction/A%20Tale%20of%20Two%20Perspectives.md" },
            { name: "A Balanced Life", url: "https://tempestaethel.github.io/AuroraChronicles/Flash%20Fiction/A%20Balanced%20Life.md" },
            { name: "The Fault Lines", url: "https://tempestaethel.github.io/AuroraChronicles/Flash%20Fiction/The%20Fault%20Lines.md" },
            { name: "The Needs We Carry", url: "https://tempestaethel.github.io/AuroraChronicles/Flash%20Fiction/The%20Needs%20We%20Carry.md" },
            { name: "The Weight of Expectations", url: "https://tempestaethel.github.io/AuroraChronicles/Flash%20Fiction/The%20Weight%20of%20Expectations.md" },
            { name: "The Weight of Words", url: "https://tempestaethel.github.io/AuroraChronicles/Flash%20Fiction/The%20Weight%20of%20Words.md" }
        ],
        "Short Stories": [
            { name: "A Journey Through Gender Roles", url: "https://tempestaethel.github.io/AuroraChronicles/Short%20Stories/A%20Journey%20Through%20Gender%20Roles.md" },
            { name: "Unspoken Expectations", url: "https://tempestaethel.github.io/AuroraChronicles/Short%20Stories/Unspoken%20Expectations.md" }
        ],
        "Novel": [
            { name: "Fractured", url: "https://tempestaethel.github.io/AuroraChronicles/Novel/Fractured.md" }
        ],
        "Epic": [
            { name: "The Crumbling Citadel", url: "https://tempestaethel.github.io/AuroraChronicles/Epic/The%20Crumbling%20Citadel.md" }
        ]
    };

    function loadStories() {
        const storySections = document.getElementById('story-sections');

        Object.keys(stories).forEach(category => {
            const section = document.createElement('div');
            const header = document.createElement('h2');
            header.textContent = category;
            section.appendChild(header);

            const container = document.createElement('div');
            container.classList.add('story-container');

            stories[category].forEach(story => {
                const storyLink = document.createElement('a');
                storyLink.href = story.url;
                storyLink.classList.add('story-button');
                storyLink.textContent = story.name; // Displaying only the story name
                container.appendChild(storyLink);
            });

            section.appendChild(container);
            storySections.appendChild(section);
        });
    }

    window.onload = function () {
        loadTheme();
        loadStories(); // Load static stories
    };
</script>

</head>
<body>
    <header>
        <h1>Aurora Chronicles - Story Hub</h1>
        <p>Your gateway to explore various stories.</p>
        <button class="toggle-btn" onclick="toggleTheme()">Toggle Theme</button>
    </header>

    <div id="story-sections">
        <!-- Static story categories and links will be loaded here -->
    </div>

    <footer>
        <p>&copy; 2024 Aurora Chronicles. All Rights Reserved.</p>
    </footer>
</body>
</html>
