<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://raw.githubusercontent.com/TempestAethel/AuroraChronicles/main/Favicon.png" type="image/png">
    <title>Long Story Viewer</title>
    <style>
        /* Default styles for dark mode */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        h1, h2, h3, h4 {
            margin-bottom: 10px;
        }

        a {
            color: #bb86fc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background-color: #1f1f1f;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.6);
        }

        .toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background-color: #6200ea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .toggle-btn:hover {
            background-color: #3700b3;
        }

        /* Light mode styles */
        .light-theme {
            background-color: #ffffff;
            color: #121212;
        }

        .light-theme .container {
            background-color: #f0f0f0;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .light-theme h1, .light-theme h2, .light-theme h3, .light-theme h4 {
            color: #121212;
        }

        .light-theme .toggle-btn {
            background-color: #03a9f4;
        }

        .light-theme .toggle-btn:hover {
            background-color: #0288d1;
        }

        hr {
            border: 1px solid #444;
            margin: 20px 0;
        }

        .chapter {
            margin-bottom: 50px;
        }

        /* Custom colors for headers (h1, h2, h3, h4) */
        h1 {
            color: #03a9f4; /* Cyan for h1 */
        }

        h2 {
            color: #0288d1; /* Darker Cyan for h2 */
        }

        h3 {
            color: #03a9f4; /* Lighter Cyan for h3 */
        }

        h4 {
            color: #80deea; /* Very light Cyan for h4 */
        }

        .chapter-title {
            font-size: 1.6em;
            font-weight: bold;
            text-align: center; /* Centering chapter titles */
        }

        .chapter-content {
            margin-top: 10px;
            font-size: 1.1em;
            text-align: justify; /* Keeping text left-aligned */
        }

        .chapter-content p {
            margin-bottom: 20px;
        }

        /* Adjusting responsiveness for smaller screens */
        @media screen and (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 15px;
            }

            .toggle-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <button class="toggle-btn" id="themeToggle">Switch to Light Theme</button>

    <div class="container">
        <h1 id="storyTitle">Long Story</h1>
        <div id="markdown-content">
            <!-- The content will be loaded here -->
        </div>
    </div>

    <!-- Include Showdown.js for Markdown rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/1.9.1/showdown.min.js"></script>
    <script>
        // Function to fetch the content of a specific markdown file from the repository
        function loadStoryContent(storyNumber) {
            const fileUrl = `https://raw.githubusercontent.com/TempestAethel/AuroraChronicles/main/Long%20Stories/Markdowns/Story_${storyNumber}.md`;
            fetch(fileUrl)
                .then(response => {
                    if (response.ok) {
                        return response.text();
                    } else {
                        throw new Error('File not found');
                    }
                })
                .then(markdown => {
                    const converter = new showdown.Converter();
                    const htmlContent = converter.makeHtml(markdown);
                    document.getElementById('markdown-content').innerHTML = htmlContent;
                    document.getElementById('storyTitle').innerText = `Story ${storyNumber}`;
                })
                .catch(error => {
                    document.getElementById('markdown-content').innerHTML = `<p>Error loading the story content. Please try again later.</p>`;
                    console.error('Error loading story content:', error);
                });
        }

        // Theme toggle functionality
        const themeToggleBtn = document.getElementById('themeToggle');
        const body = document.body;

        // Check if theme is saved in localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.classList.add(savedTheme);
            themeToggleBtn.textContent = savedTheme === 'light-theme' ? 'Switch to Dark Theme' : 'Switch to Light Theme';
        }

        // Toggle theme when the button is clicked
        themeToggleBtn.addEventListener('click', () => {
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                localStorage.setItem('theme', 'dark-theme');
                themeToggleBtn.textContent = 'Switch to Light Theme';
            } else {
                body.classList.add('light-theme');
                localStorage.setItem('theme', 'light-theme');
                themeToggleBtn.textContent = 'Switch to Dark Theme';
            }
        });

        // Load the specific story based on the URL fragment (e.g., #1, #2, ...)
        window.onload = function () {
            const urlHash = window.location.hash;
            const storyNumber = urlHash ? urlHash.substring(1) : 1; // Default to Story 1
            loadStoryContent(storyNumber);
        };
    </script>

</body>
</html>
